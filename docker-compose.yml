# PCI WhatsApp Bot — deployable as a Dokploy "Docker Compose" stack.
# Set the environment variables in the Dokploy panel (they interpolate below).
# WAHA and the bot share this stack's network, so WAHA reaches the bot
# internally at http://bot:8090 — no public URL needed for the webhook.
services:
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    # No host port binding (avoids clashes with other stacks). Expose the WAHA
    # dashboard for the one-time QR scan via a Dokploy Domain -> service waha,
    # container port 3000 (enable Basic Auth on it).
    expose:
      - "3000"
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      # WAHA reads these exact names for the global webhook (not WAHA_WEBHOOK_*).
      WHATSAPP_HOOK_URL: http://bot:8090/webhook/waha?token=${WEBHOOK_TOKEN}
      WHATSAPP_HOOK_EVENTS: message
      # Pin dashboard + swagger logins so they don't regenerate on each restart.
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME:-admin}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
    volumes:
      - waha-sessions:/app/.sessions

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - waha
    environment:
      PORT: 8090
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN}
      WAHA_BASE_URL: http://waha:3000
      WAHA_SESSION: ${WAHA_SESSION:-default}
      WAHA_API_KEY: ${WAHA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      BITRIX_API_BASE: ${BITRIX_API_BASE:-https://calcenchancev2.premierchoiceint.online}
      SALES_MANAGER_WHATSAPP: ${SALES_MANAGER_WHATSAPP}
      TEAM_B2B_WHATSAPP: ${TEAM_B2B_WHATSAPP}
      TEAM_B2C_WHATSAPP: ${TEAM_B2C_WHATSAPP}
      TEAM_CARE_WHATSAPP: ${TEAM_CARE_WHATSAPP}
    volumes:
      - bot-data:/app/data # persists per-chat sessions across redeploys

volumes:
  waha-sessions:
  bot-data:
